modLoader="javafml"
loaderVersion="${loader_version_range}"

license="${mod_license}"

clientSideOnly=true 

[[mods]]
modId="${mod_id}" 
version="${mod_version}" 
displayName="${mod_name}" 

displayTest="NONE"

authors="${mod_authors}" 
description='''${mod_description}'''

[mods.features]
    java_version="[21,)"

[[dependencies.${mod_id}]] 
    modId="forge"
    mandatory=true 
    versionRange="${forge_version_range}" 
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
